services:

  # ──── Database ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: coffeeshop-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./observability-config/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ──── Observability Infrastructure ────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./observability-config/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - tempo
      - loki

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./observability-config/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:2.10.0
    container_name: tempo
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./observability-config/tempo.yml:/etc/tempo.yml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:3.7.0
    container_name: loki
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./observability-config/loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki
    ports:
      - "3100:3100"

  loki-mcp:
    build: https://github.com/grafana/loki-mcp.git
    container_name: loki-mcp
    environment:
      LOKI_URL: http://loki:3100
    ports:
      - "8085:8080"
    depends_on:
      - loki

  prometheus-mcp:
    image: ghcr.io/pab1it0/prometheus-mcp-server:latest
    container_name: prometheus-mcp
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      PROMETHEUS_MCP_SERVER_TRANSPORT: http
      PROMETHEUS_MCP_BIND_HOST: 0.0.0.0
      PROMETHEUS_MCP_BIND_PORT: "8080"
    ports:
      - "8086:8080"
    depends_on:
      - prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./observability-config/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

  # ──── Application Services ─────────────────────────────────────────────────
  catalog-service:
    build:
      context: ./catalog-service
    container_name: catalog-service
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/catalog_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      OTEL_SERVICE_NAME: catalog-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=coffeeshop,deployment.environment=local"

  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      OTEL_SERVICE_NAME: inventory-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=coffeeshop,deployment.environment=local"

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      catalog-service:
        condition: service_started
      inventory-service:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      CATALOG_SERVICE_URL: http://catalog-service:8081
      INVENTORY_SERVICE_URL: http://inventory-service:8083
      OTEL_SERVICE_NAME: order-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=coffeeshop,deployment.environment=local"

  # ──── Vector Database ────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.14.0
    container_name: qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ──── Code Embeddings (Jina Code V2 via HuggingFace TEI) ─────────────────────
  jina-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu
    container_name: jina-embeddings
    command: --model-id jinaai/jina-embeddings-v2-base-code
    volumes:
      - embeddings_cache:/data
    ports:
      - "8087:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ──── Code Search MCP Server ──────────────────────────────────────────────────
  code-search:
    build:
      context: ./code-search
    container_name: code-search
    ports:
      - "8090:8090"
    depends_on:
      qdrant:
        condition: service_healthy
      jina-embeddings:
        condition: service_healthy
    volumes:
      - .:/code:ro
    environment:
      QDRANT_URL: http://qdrant:6333
      EMBEDDINGS_URL: http://jina-embeddings:80
      CODE_BASE_PATH: /code
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8090"
      CONFIG_PATH: /app/config.yaml

  # ──── AI Chat Agent ─────────────────────────────────────────────────────────
  observability-chat:
    build:
      context: ./observability-chat
    container_name: observability-chat
    ports:
      - "8084:8084"
    depends_on:
      - tempo
      - loki-mcp
      - prometheus-mcp
      - code-search
    env_file:
      - ./observability-chat/.env
    environment:
      MCP_SERVERS: '[{"name":"tempo","url":"http://tempo:3200/api/mcp"},{"name":"loki","url":"http://loki-mcp:8080/stream"},{"name":"prometheus","url":"http://prometheus-mcp:8080/mcp"},{"name":"code-search","url":"http://code-search:8090/mcp"}]'
      CORS_ORIGINS: '["http://localhost:8084"]'

volumes:
  postgres_data:
  tempo_data:
  loki_data:
  grafana_data:
  qdrant_data:
  embeddings_cache:
